<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>FitPlan Smart - Elite Edition</title>
    <style>
        :root { 
            --primary: #007AFF; --success: #34C759; --accent: #FF9500; 
            --bg: #F2F2F7; --card: #FFFFFF; --text: #000000; --text-secondary: #8E8E93;
        }
        @media (prefers-color-scheme: dark) {
            :root { --bg: #000000; --card: #1C1C1E; --text: #FFFFFF; --text-secondary: #AEAEB2; }
        }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg); color: var(--text); margin: 0; padding: 20px; 
            -webkit-font-smoothing: antialiased;
        }
        .container { max-width: 500px; margin: auto; }
        
        header { display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 25px; }
        h1 { font-size: 32px; font-weight: 800; letter-spacing: -1px; margin: 0; }

        .secao-input { background: var(--card); border-radius: 14px; padding: 5px 15px; margin-bottom: 20px; }
        .input-row { display: flex; align-items: center; padding: 12px 0; border-bottom: 0.5px solid rgba(198, 198, 200, 0.4); }
        .input-row:last-child { border-bottom: none; }
        label { width: 140px; font-size: 15px; }
        input, select { flex: 1; border: none; background: transparent; font-size: 15px; color: var(--text); text-align: right; outline: none; }
        
        /* Ajuste para textarea de preferências */
        .input-block { padding: 12px 0; border-bottom: 0.5px solid rgba(198, 198, 200, 0.4); }
        .input-block:last-child { border-bottom: none; }
        .input-block label { display: block; width: 100%; margin-bottom: 8px; font-size: 15px; }
        .input-block textarea { width: 100%; border: none; background: var(--bg); border-radius: 10px; padding: 10px; font-size: 14px; color: var(--text); outline: none; resize: none; box-sizing: border-box; }

        .agenda-grid { background: var(--card); border-radius: 14px; padding: 15px; margin-bottom: 20px; }
        .agenda-grid h3 { margin: 0 0 12px 0; font-size: 16px; color: var(--primary); text-align: center; }
        .dia-row { display: flex; align-items: center; margin-bottom: 8px; gap: 10px; }
        .dia-label { width: 45px; font-size: 11px; font-weight: 800; color: var(--text-secondary); text-transform: uppercase; }
        .dia-input { flex: 1; background: var(--bg); border: none; padding: 10px; border-radius: 10px; font-size: 14px; color: var(--text); }

        button { 
            width: 100%; padding: 18px; background: var(--primary); color: white; border: none; 
            border-radius: 14px; font-size: 17px; font-weight: 600; cursor: pointer; margin-bottom: 10px;
        }

        #resultado { display: none; animation: fadeIn 0.4s; }
        .perfil-resumo-top { font-size: 13px; color: var(--text-secondary); margin-bottom: 20px; padding-left: 10px; border-left: 3px solid var(--primary); }
        
        .card-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .card { background: var(--card); padding: 15px; border-radius: 14px; text-align: center; }
        .card strong { display: block; font-size: 10px; color: var(--text-secondary); text-transform: uppercase; margin-bottom: 5px; }
        .card span { font-size: 18px; font-weight: 800; color: var(--primary); }

        .bloco { background: var(--card); padding: 18px; border-radius: 16px; margin-bottom: 15px; }
        .bloco h3 { margin: 0 0 12px 0; font-size: 16px; color: var(--primary); }
        
        .tabs-menu { display: flex; background: var(--bg); border-radius: 10px; padding: 2px; margin-bottom: 15px; gap: 2px; }
        .tab-btn { flex: 1; background: transparent; border: none; color: var(--text-secondary); padding: 8px 0; font-size: 13px; font-weight: 600; border-radius: 8px; cursor: pointer; margin-bottom: 0; }
        .tab-btn.active { background: var(--card); color: var(--primary); box-shadow: 0px 1px 3px rgba(0,0,0,0.1); }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s; }

        .dieta-box { border-left: 4px solid var(--success); padding-left: 12px; margin-bottom: 15px; }
        .dieta-box.alt { border-left-color: var(--accent); }
        .dieta-box b { font-size: 12px; color: var(--text-secondary); text-transform: uppercase; display: block; }
        .dieta-box p { margin: 5px 0 0; font-size: 15px; line-height: 1.4; }

        .info-final { font-size: 12px; color: var(--text-secondary); line-height: 1.6; }
        .info-final b { color: var(--text); }

        #historico-secao { margin-top: 25px; padding-top: 15px; border-top: 1px solid rgba(198, 198, 200, 0.4); }
        .hist-item { background: var(--card); padding: 10px; border-radius: 10px; margin-bottom: 6px; display: flex; justify-content: space-between; align-items: center; font-size: 12px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="container">
    <header>
        <svg width="40" height="40" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect width="100" height="100" rx="22" fill="url(#paint0_linear)"/>
            <path d="M50 15L75 25V55C75 72.5 50 85 50 85C50 85 25 72.5 25 55V25L50 15Z" fill="white" fill-opacity="0.2"/>
            <path d="M50 30V45M50 45L40 50M50 45L60 50" stroke="white" stroke-width="6" stroke-linecap="round"/>
            <path d="M40 60C40 60 43 68 50 68C57 68 60 60 60 60" stroke="#34C759" stroke-width="6" stroke-linecap="round"/>
            <defs>
                <linearGradient id="paint0_linear" x1="0" y1="0" x2="100" y2="100" gradientUnits="userSpaceOnWrite">
                    <stop stop-color="#007AFF"/>
                    <stop offset="1" stop-color="#0051A8"/>
                </linearGradient>
            </defs>
        </svg>
        <h1>FitPlan <span style="color:var(--primary);">Smart</span></h1>
    </header>
    
    <div id="form-dieta">
        <div class="secao-input">
            <div class="input-row"><label>Nome</label><input type="text" id="nome"></div>
            <div class="input-row"><label>Peso (kg)</label><input type="number" id="peso" step="0.1"></div>
            <div class="input-row"><label>Altura (cm)</label><input type="number" id="altura"></div>
            <div class="input-row"><label>Idade</label><input type="number" id="idade"></div>
        </div>

        <div class="agenda-grid">
            <h3>🗓️ Minha Agenda de Treinos</h3>
            <div id="agenda-inputs"></div>
        </div>

        <div class="secao-input">
            <div class="input-row">
                <label>Objetivo</label>
                <select id="objetivo">
                    <option value="emagrecer">Emagrecer</option>
                    <option value="manter">Manter Peso</option>
                    <option value="ganhar">Ganhar Massa</option>
                </select>
            </div>
            <div class="input-row">
                <label>Restrição</label>
                <select id="restricao">
                    <option value="nenhuma">Nenhuma</option>
                    <option value="vegano">Vegano</option>
                    <option value="lactose">Sem Lactose</option>
                    <option value="gluten">Sem Glúten</option>
                </select>
            </div>
            <div class="input-block">
                <label>🍕 Alimentos que você ama comer:</label>
                <textarea id="preferencias" rows="2" placeholder="Ex: arroz, feijão, chocolate, hambúrguer, banana, batata frita..."></textarea>
            </div>
        </div>
        <button onclick="gerarPlano()">Gerar Estratégia de Elite</button>
    </div>

    <div id="resultado">
        <h2 id="saudacao"></h2>
        <div id="perfil-info-top" class="perfil-resumo-top"></div>

        <div class="card-grid">
            <div class="card"><strong>Kcal</strong><span id="res-kcal"></span></div>
            <div class="card"><strong>Proteína</strong><span id="res-p"></span></div>
            <div class="card"><strong>Carbo</strong><span id="res-c"></span></div>
        </div>

        <div class="bloco" style="border-left: 4px solid var(--accent);">
            <h3>🏅 Feedback Esportivo Estratégico</h3>
            <div id="feedback-coach" style="font-size: 14px; line-height: 1.5; color: var(--text);"></div>
        </div>

        <div class="bloco">
            <h3>🍴 Cardápios Adaptados ao Seu Gosto</h3>
            <div class="tabs-menu">
                <button class="tab-btn active" onclick="switchTab('opcaoA')">Opção A</button>
                <button class="tab-btn" onclick="switchTab('opcaoB')">Opção B</button>
                <button class="tab-btn" onclick="switchTab('opcaoC')">Opção C</button>
                <button class="tab-btn" onclick="switchTab('opcaoD')">Opção D</button>
            </div>
            <div id="cardapio-conteudo"></div>
        </div>

        <div class="bloco" style="background: rgba(0,0,0,0.03); border: 1px dashed var(--text-secondary);">
            <h3>📋 Resumo do Perfil Técnico</h3>
            <div id="info-usuario-final" class="info-final"></div>
        </div>

        <div id="historico-secao">
            <h3 style="font-size: 14px; margin-bottom: 10px;">🕒 Histórico de Evolução</h3>
            <div id="lista-historico"></div>
        </div>
        
        <button onclick="location.reload()" style="background: #3A3A3C; margin-top: 20px;">Nova Consulta</button>
    </div>
</div>

<script>
const dias = ["Seg", "Ter", "Qua", "Qui", "Sex", "Sáb", "Dom"];

window.onload = () => {
    const container = document.getElementById('agenda-inputs');
    dias.forEach(dia => {
        const salvo = localStorage.getItem(`treino_${dia}`) || "";
        container.innerHTML += `
            <div class="dia-row">
                <span class="dia-label">${dia}</span>
                <input type="text" id="in_${dia}" class="dia-input" value="${salvo}" placeholder="Ex: Musculação + Cardio">
            </div>`;
    });
    if(localStorage.getItem('fit_nome')) document.getElementById('nome').value = localStorage.getItem('fit_nome');
    exibirHistorico();
};

function switchTab(tabId) {
    document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
    
    document.getElementById(tabId).classList.add('active');
    event.currentTarget.classList.add('active');
}

function gerarPlano() {
    const nome = document.getElementById('nome').value || "Atleta";
    const peso = parseFloat(document.getElementById('peso').value);
    const altura = parseFloat(document.getElementById('altura').value);
    const idade = parseInt(document.getElementById('idade').value);
    const objetivo = document.getElementById('objetivo').value;
    const restricao = document.getElementById('restricao').value;
    const prefs = (document.getElementById('preferencias').value || "").toLowerCase();

    if (!peso || !altura || !idade) return alert("Preencha todos os dados.");
    localStorage.setItem('fit_nome', nome);

    let treinosTotais = 0;
    let diasDuplos = 0;
    let agendaStr = "";
    let agendaResumo = "";

    dias.forEach(dia => {
        const t = document.getElementById(`in_${dia}`).value;
        localStorage.setItem(`treino_${dia}`, t);
        if(t.trim() && t.toLowerCase() !== "descanso") {
            treinosTotais++;
            agendaStr += t.toLowerCase() + " ";
            agendaResumo += `${dia}: ${t} | `;
            if(t.includes("+") || t.toLowerCase().includes(" e ")) diasDuplos++;
        }
    });

    let fa = 1.2;
    if(treinosTotais >= 3) fa = 1.375;
    if(treinosTotais >= 5) fa = 1.55;
    if(diasDuplos >= 2) fa = 1.725;
    if(diasDuplos >= 4) fa = 1.9;

    let kcal = ((10 * peso) + (6.25 * altura) - (5 * idade) + 5) * fa;
    if (objetivo === 'emagrecer') kcal -= 450;
    if (objetivo === 'ganhar') kcal += 450;

    const pG = peso * 2.2;
    const cG = (kcal - (pG * 4) - (peso * 0.9 * 9)) / 4;

    // ALIMENTOS BASE CALCULADOS
    const arroz = Math.round((cG * 0.30) / 0.28);
    const batataDoce = Math.round((cG * 0.30) / 0.20);
    const aveia = Math.round((cG * 0.20) / 0.60);
    const frango = Math.round((pG * 0.30) / 0.25);
    const carneMagra = Math.round((pG * 0.30) / 0.26);
    const tofu = Math.round((pG * 0.30) / 0.08);

    // INTEGRAÇÃO DE PREFERÊNCIAS E ADAPTAÇÕES SAUDÁVEIS
    let carbAlmoco = `${arroz}g de Arroz Integral`;
    let protAlmoco = restricao === 'vegano' ? `${tofu}g de Tofu Grelhado` : `${frango}g de Peito de Frango`;
    let docePermitido = "1 Fruta Fresca";
    let lancheCustom = "Shake: 1 Banana + Aveia + Proteína";
    let jantarCustom = restricao === 'vegano' ? `${tofu}g de Tofu` : `${frango}g de Frango Desfiado`;
    let fbkCustom = "";

    // Análise de gatilhos de preferências
    if(prefs.includes("batata doce") || prefs.includes("mandioca")) {
        carbAlmoco = `${batataDoce}g de Batata Doce ou Mandioca Assada`;
    } else if(prefs.includes("arroz") || prefs.includes("feijão") || prefs.includes("feijao")) {
        carbAlmoco = `${Math.round(arroz * 0.7)}g de Arroz + 80g de Feijão`;
    } else if(prefs.includes("macarrão") || prefs.includes("macarrao") || prefs.includes("massa")) {
        carbAlmoco = `${Math.round(arroz * 0.9)}g de Macarrão Integral ao Molho Sugo`;
    }

    if(prefs.includes("carne") || prefs.includes("patinho") || prefs.includes("bife")) {
        if(restricao !== 'vegano') protAlmoco = `${carneMagra}g de Patinho Moído ou Filé Mignon Grelhado`;
    }

    if(prefs.includes("chocolate") || prefs.includes("doce")) {
        docePermitido = "20g de Chocolate Amargo 70% ou superior";
        fbkCustom += `🍫 <b>Ajuste de Desejo:</b> Alocamos um quadrado de chocolate amargo logo após o seu almoço. O teor de cacau ajuda na saciedade e não prejudica sua queima calórica.<br><br>`;
    }
    
    if(prefs.includes("hambúrguer") || prefs.includes("hamburguer")) {
        jantarCustom = `Hambúrguer Caseiro Fit (${carneMagra}g de carne magra moldada grelhada) no Prato com salada`;
        fbkCustom += `🍔 <b>Versão Fit de Elite:</b> Seu desejo por hambúrguer foi adaptado! Prepare em casa com carne magra pura, sem óleo, servido direto no prato com queijo magro.<br><br>`;
    }

    if(prefs.includes("pizza")) {
        jantarCustom = `Pizza Fit de Frigideira (Massa de Rap10 Integral ou Couve-flor, molho natural, queijo magro e frango desfiado)`;
        fbkCustom += `🍕 <b>Noite de Pizza Saudável:</b> Adaptamos o jantar para uma versão de pizza funcional de baixa caloria e alta proteína.<br><br>`;
    }

    if(prefs.includes("ovo") || prefs.includes("omelete")) {
        lancheCustom = "Omelete de 3 ovos com vegetais + 1 fatia de pão integral";
    }

    // MOTOR DE FEEDBACK GERAL
    let fbk = `💧 <b>Hidratação Crítica:</b> Consuma no mínimo <b>${Math.round(peso * 45)}ml</b> de água.<br><br>${fbkCustom}`;
    if(diasDuplos > 0) fbk += `⚡ <b>Volume de Elite:</b> Identificamos ${diasDuplos} dias de carga dupla. Use o carboidrato do almoço como sua base de energia.<br><br>`;
    if(agendaStr.includes("musculação") || agendaStr.includes("academia")) fbk += `💪 <b>Anabolismo:</b> Tente distribuir as <b>${Math.round(pG)}g de proteína</b> em refeições iguais ao longo do dia.<br>`;

    document.getElementById('feedback-coach').innerHTML = fbk;

    // CONFIGURAÇÃO DE ACORDO COM AS RESTRIÇÕES FIXAS
    let pao = restricao === "gluten" ? "Pão Sem Glúten" : "Pão Integral";
    let shakeBase = restricao === "vegano" ? "Proteína Isolada de Ervilha" : (restricao === "lactose" ? "Whey Isolado Zero Lactose" : "Whey Protein");

    // ESTRUTURA DOS CARDÁPIOS COM AS PREFERÊNCIAS INJETADAS
    let cardapioHTML = `
        <div id="opcaoA" class="tab-content active">
            <div class="dieta-box"><b>Café da Manhã</b><p>${restricao === 'vegano' ? 'Mexido de Tofu' : '3 Ovos Mexidos'} + 2 Fatias de ${pao} + 1 Fruta de sua escolha</p></div>
            <div class="dieta-box alt"><b>Almoço (Adaptado)</b><p>${carbAlmoco} + ${protAlmoco} + Salada Verde Livre + <b>Sobremesa:</b> ${docePermitido}</p></div>
            <div class="dieta-box"><b>Lanche da Tarde</b><p>${lancheCustom}</p></div>
            <div class="dieta-box alt"><b>Jantar (Adaptado)</b><p>${jantarCustom} + Legumes no Vapor (Brócolis/Chuchu)</p></div>
        </div>

        <div id="opcaoB" class="tab-content">
            <div class="dieta-box"><b>Café da Manhã</b><p>Vitamina Prática: 1 Banana + ${aveia}g de Aveia + 30g de ${shakeBase}</p></div>
            <div class="dieta-box alt"><b>Almoço</b><p>${batataDoce}g de Batata Doce + ${restricao === 'vegano' ? '180g de Grão de Bico' : carneMagra + 'g de Patinho'} + Salada</p></div>
            <div class="dieta-box"><b>Lanche da Tarde</b><p>2 Fatias de ${pao} + ${restricao === 'vegano' ? 'Hummus' : '3 Ovos Cozidos'}</p></div>
            <div class="dieta-box alt"><b>Jantar</b><p>${arroz}g de Arroz Integral + Peixe Grelhado + Mix de Folhas</p></div>
        </div>

        <div id="opcaoC" class="tab-content">
            <div class="dieta-box"><b>Café da Manhã</b><p>Crepioca Funcional (2 ovos + 30g de Tapioca) *Se vegano: Tapioca com Tofu</p></div>
            <div class="dieta-box alt"><b>Almoço</b><p>${carbAlmoco} + ${protAlmoco} + Vegetais Variados</p></div>
            <div class="dieta-box"><b>Lanche da Tarde</b><p>1 Maçã Picada + 20g de Castanhas + Dose de ${shakeBase}</p></div>
            <div class="dieta-box alt"><b>Jantar</b><p>Sopa de Legumes Batida com ${restricao === 'vegano' ? 'Proteína de Soja' : 'Desfiado de Frango'}</p></div>
        </div>

        <div id="opcaoD" class="tab-content">
            <div class="dieta-box"><b>Café da Manhã</b><p>Bowl: 150g de Iogurte Magro (ou Vegano) + ${aveia}g de Aveia + Morangos Picados</p></div>
            <div class="dieta-box alt"><b>Almoço</b><p>${batataDoce}g de Mandioca Cozida + ${protAlmoco} + Aspargos</p></div>
            <div class="dieta-box"><b>Lanche da Tarde</b><p>Tomates Cereja + Cubos de Queijo Magro (ou Tofu) + 1 Torrada de Arroz</p></div>
            <div class="dieta-box alt"><b>Jantar</b><p>Wrap leve com folha de Couve ou Rap10 Integral recheado com Proteína e Rúcula</p></div>
        </div>
    `;
    
    document.getElementById('cardapio-conteudo').innerHTML = cardapioHTML;

    document.getElementById('saudacao').innerText = `Consultoria: ${nome}`;
    document.getElementById('res-kcal').innerText = Math.round(kcal);
    document.getElementById('res-p').innerText = Math.round(pG) + "g";
    document.getElementById('res-c').innerText = Math.round(cG) + "g";
    
    document.getElementById('info-usuario-final').innerHTML = `
        • <b>Atleta:</b> ${nome} | ${peso}kg | ${altura}cm<br>
        • <b>Restrições:</b> ${restricao.toUpperCase()}<br>
        • <b>Preferências Adaptadas:</b> ${prefs || "Nenhuma informada"}<br>
        • <b>Rotina:</b> ${agendaResumo || "Não informada"}
    `;

    const h = JSON.parse(localStorage.getItem('fit_hist_vElite')) || [];
    h.unshift({ d: new Date().toLocaleDateString(), p: peso, k: Math.round(kcal) });
    localStorage.setItem('fit_hist_vElite', JSON.stringify(h.slice(0,5)));

    document.getElementById('form-dieta').style.display = 'none';
    document.getElementById('resultado').style.display = 'block';
    exibirHistorico();
}

function exibirHistorico() {
    const h = JSON.parse(localStorage.getItem('fit_hist_vElite')) || [];
    document.getElementById('lista-historico').innerHTML = h.map(i => `
        <div class="hist-item"><span>${i.d}</span><strong>${i.p}kg · ${i.k} kcal</strong></div>
    `).join('');
}
</script>
</body>
</html>
