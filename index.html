<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>FitPlan Smart — Elite</title>
<link rel="preconnect" href="https://fonts.googleapis.com">

    :root {
        --ink:        #10201A;
        --ink-soft:   #5C7069;
        --bg:         #EFF3F0;
        --card:       #FFFFFF;
        --line:       rgba(16,32,26,0.08);
        --primary:    #0B6E52;
        --primary-d:  #084F3B;
        --accent:     #FF5B35;
        --accent-d:   #E14722;
        --gold:       #C99A3B;
        --shadow:     0 1px 2px rgba(16,32,26,0.04), 0 8px 24px -12px rgba(16,32,26,0.18);
    }
    * { box-sizing: border-box; }
    body {
        font-family: 'Work Sans', -apple-system, BlinkMacSystemFont, sans-serif;
        background: var(--bg);
        color: var(--ink);
        margin: 0;
        padding: 24px 16px 60px;
        -webkit-font-smoothing: antialiased;
    }
    .container { max-width: 520px; margin: auto; }

    .eyebrow {
        font-size: 11px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase;
        color: var(--primary); margin: 0 0 4px 2px;
    }

    header {
        display: flex; align-items: center; gap: 14px; margin-bottom: 28px;
    }
    h1 {
        font-family: 'Bebas Neue', sans-serif;
        font-size: 40px; letter-spacing: 0.02em; margin: 0; line-height: 1;
        color: var(--ink);
    }
    h1 span { color: var(--primary); }

    /* ---- Cards / sections ---- */
    .surface {
        background: var(--card);
        border-radius: 18px;
        box-shadow: var(--shadow);
        margin-bottom: 18px;
        overflow: hidden;
    }
    .surface-pad { padding: 6px 18px; }
    .section-title {
        font-family: 'Bebas Neue', sans-serif;
        font-size: 15px; letter-spacing: 0.08em; text-transform: uppercase;
        color: var(--primary-d); padding: 16px 18px 8px;
    }

    .input-row {
        display: flex; align-items: center; padding: 13px 0;
        border-bottom: 1px solid var(--line);
    }
    .input-row:last-child { border-bottom: none; }
    label { width: 130px; font-size: 14.5px; font-weight: 500; color: var(--ink); flex-shrink: 0; }
    input, select {
        flex: 1; border: none; background: transparent; font-size: 15px; color: var(--ink);
        text-align: right; outline: none; font-family: inherit;
    }
    select { appearance: none; -webkit-appearance: none; }
    input::placeholder { color: #B7C2BD; }

    .input-block { padding: 14px 0; border-bottom: 1px solid var(--line); }
    .input-block:last-child { border-bottom: none; }
    .input-block label { display: block; width: 100%; margin-bottom: 8px; }
