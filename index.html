<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>FitPlan Pro - Completo</title>
    <style>
        :root { 
            --primary: #007AFF; --success: #34C759; --accent: #FF9500; 
            --bg: #F2F2F7; --card: #FFFFFF; --text: #000000; --text-secondary: #8E8E93;
        }
        @media (prefers-color-scheme: dark) {
            :root { --bg: #000000; --card: #1C1C1E; --text: #FFFFFF; --text-secondary: #AEAEB2; }
        }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background-color: var(--bg); color: var(--text); margin: 0; padding: 20px; 
            -webkit-font-smoothing: antialiased;
        }
        .container { max-width: 500px; margin: auto; }
        h1 { font-size: 32px; font-weight: 800; letter-spacing: -1px; margin-bottom: 20px; }
        
        .secao-input { background: var(--card); border-radius: 14px; padding: 5px 15px; margin-bottom: 20px; }
        .input-row { display: flex; align-items: center; padding: 12px 0; border-bottom: 0.5px solid #C6C6C8; }
        .input-row:last-child { border-bottom: none; }
        label { width: 140px; font-size: 16px; font-weight: 400; }
        input, select { flex: 1; border: none; background: transparent; font-size: 16px; color: var(--text); text-align: right; outline: none; }

        button { 
            width: 100%; padding: 16px; background: var(--primary); color: white; border: none; 
            border-radius: 14px; font-size: 17px; font-weight: 600; cursor: pointer;
        }
        #resultado { margin-top: 25px; display: none; animation: fadeIn 0.4s; }
        .card-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .card { background: var(--card); padding: 12px; border-radius: 12px; text-align: center; }
        .card strong { display: block; font-size: 11px; color: var(--text-secondary); text-transform: uppercase; }
        .card span { font-size: 18px; font-weight: 700; color: var(--primary); }

        .bloco { background: var(--card); padding: 18px; border-radius: 16px; margin-bottom: 15px; }
        .bloco h3 { margin: 0 0 12px 0; font-size: 18px; color: var(--primary); }
        .op { border-left: 3px solid var(--success); padding-left: 10px; margin-bottom: 15px; font-size: 14px; }
        .destaque { font-weight: 700; color: var(--text); }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="container">
    <h1>Saúde <span style="color:var(--primary);">Smart</span></h1>
    
    <div id="form-dieta">
        <div class="secao-input">
            <div class="input-row"><label>Idade</label><input type="number" id="idade" placeholder="Anos"></div>
            <div class="input-row"><label>Peso (kg)</label><input type="number" id="peso" step="0.1" placeholder="0.0"></div>
            <div class="input-row"><label>Altura (cm)</label><input type="number" id="altura" placeholder="0"></div>
        </div>

        <div class="secao-input">
            <div class="input-row">
                <label>Atividade</label>
                <select id="atividade">
                    <option value="1.2">Sedentário</option>
                    <option value="1.375">Leve (1-2x semana)</option>
                    <option value="1.55">Moderado (3-5x semana)</option>
                    <option value="1.725">Intenso (Todo dia)</option>
                </select>
            </div>
            <div class="input-row">
                <label>Objetivo</label>
                <select id="objetivo">
                    <option value="emagrecer">Emagrecer</option>
                    <option value="manter">Manter Peso</option>
                    <option value="ganhar">Ganhar Massa</option>
                </select>
            </div>
            <div class="input-row">
                <label>Esporte</label>
                <input type="text" id="esporte" placeholder="Ex: Corrida, Crossfit...">
            </div>
            <div class="input-row">
                <label>Restrição</label>
                <select id="restricao">
                    <option value="nenhuma">Nenhuma</option>
                    <option value="vegano">Vegano / Vegetariano</option>
                    <option value="lactose">Sem Lactose</option>
                    <option value="gluten">Sem Glúten</option>
                </select>
            </div>
        </div>
        <button onclick="gerarPlano()">Gerar Meu Plano</button>
    </div>

    <div id="resultado">
        <div class="card-grid">
            <div class="card"><strong>Kcal</strong><span id="res-kcal"></span></div>
            <div class="card"><strong>Prot</strong><span id="res-p"></span>g</div>
            <div class="card"><strong>Carb</strong><span id="res-c"></span>g</div>
        </div>

        <div class="bloco">
            <h3>🍴 Cardápio Adaptado</h3>
            <div id="lista-dieta"></div>
        </div>

        <div class="bloco" style="border-left: 4px solid var(--accent);">
            <h3>🏅 Análise Esportiva</h3>
            <p id="dica-esporte" style="font-size: 14px; line-height: 1.4;"></p>
        </div>
        
        <button onclick="location.reload()" style="background: #3A3A3C;">Novo Cálculo</button>
    </div>
</div>

<script>
function gerarPlano() {
    const idade = parseInt(document.getElementById('idade').value);
    const peso = parseFloat(document.getElementById('peso').value);
    const altura = parseFloat(document.getElementById('altura').value);
    const atividade = parseFloat(document.getElementById('atividade').value);
    const objetivo = document.getElementById('objetivo').value;
    const esporte = document.getElementById('esporte').value || "seu esporte";
    const restricao = document.getElementById('restricao').value;

    if (!idade || !peso || !altura) return alert("Por favor, preencha os dados básicos.");

    // Cálculo TMB e Gasto
    let tmb = (10 * peso) + (6.25 * altura) - (5 * idade) + 5;
    let kcal = tmb * atividade;
    if (objetivo === 'emagrecer') kcal -= 500;
    if (objetivo === 'ganhar') kcal += 450;

    const p = peso * 2;
    const g = peso * 0.8;
    const c = (kcal - (p * 4) - (g * 9)) / 4;

    const arroz = Math.round((c/4) / 0.28);
    const frango = Math.round((p/4) / 0.30);
    const ovos = Math.round((p/4) / 6);

    // Lógica de substituição por restrição
    let cafe, almoco, lanche, jantar;

    if (restricao === 'vegano') {
        cafe = `Op 1: Tofu mexido com cúrcuma + 1 Fruta<br>Op 2: Iogurte de coco + 40g Aveia`;
        almoco = `Op 1: ${arroz}g Arroz + 150g Grão de bico + Salada<br>Op 2: ${Math.round(arroz*1.2)}g Batata + 120g Hambúrguer de Lentilha`;
        lanche = `Mix de nozes (30g) + 1 Banana`;
        jantar = `Op 1: ${Math.round(arroz*0.8)}g Quinoa + Tofu grelhado<br>Op 2: Sopa de ervilha com legumes`;
    } else if (restricao === 'lactose') {
        cafe = `Op 1: ${ovos} Ovos + Fruta<br>Op 2: Tapioca com ovos mexidos`;
        almoco = `Op 1: ${arroz}g Arroz + ${frango}g Frango + Salada<br>Op 2: ${Math.round(arroz*1.2)}g Batata + Carne Moída`;
        lanche = `Fruta + 30g Castanhas`;
        jantar = `${Math.round(arroz*0.8)}g Arroz + ${frango}g Peixe + Vegetais`;
    } else if (restricao === 'gluten') {
        cafe = `Op 1: ${ovos} Ovos + Raízes (Mandioca/Aipim)<br>Op 2: Omelete com queijo e fruta`;
        almoco = `Op 1: ${arroz}g Arroz + ${frango}g Frango + Salada<br>Op 2: ${Math.round(arroz*1.2)}g Batata Doce + Carne Moída`;
        lanche = `Mix de frutas secas e iogurte (sem glúten)`;
        jantar = `${Math.round(arroz*0.8)}g Arroz + ${frango}g Carne + Vegetais`;
    } else {
        cafe = `Op 1: ${ovos} Ovos + 1 Fruta<br>Op 2: Iogurte Natural + 40g Aveia`;
        almoco = `Op 1: ${arroz}g Arroz + ${frango}g Frango + Salada<br>Op 2: ${Math.round(arroz*1.2)}g Batata + Carne Moída`;
        lanche = `30g Castanhas + 1 Fruta ou Shake de Proteína`;
        jantar = `Op 1: ${Math.round(arroz*0.8)}g Arroz + ${frango}g Peixe<br>Op 2: Omelete de ${ovos} ovos com legumes`;
    }

    document.getElementById('res-kcal').innerText = Math.round(kcal);
    document.getElementById('res-p').innerText = Math.round(p);
    document.getElementById('res-c').innerText = Math.round(c);

    document.getElementById('lista-dieta').innerHTML = `
        <div class="op"><span class="destaque">Café:</span><br>${cafe}</div>
        <div class="op"><span class="destaque">Almoço:</span><br>${almoco}</div>
        <div class="op"><span class="destaque">Lanche:</span><br>${lanche}</div>
        <div class="op"><span class="destaque">Jantar:</span><br>${jantar}</div>
    `;

    document.getElementById('dica-esporte').innerHTML = `
        Análise para <b>${esporte}</b>: <br>
        Seu plano foi ajustado para seu objetivo de <b>${objetivo}</b>. 
        Mantenha a constância e beba pelo menos ${Math.round(peso * 35 / 1000)}L de água por dia.
    `;

    document.getElementById('form-dieta').style.display = 'none';
    document.getElementById('resultado').style.display = 'block';
}
</script>
</body>
</html>
